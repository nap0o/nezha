{{define "theme-custom/server-status-home"}}
{{template "theme-custom/server-status-header" .}}
<div id="app">
    {{template "theme-custom/server-status-content-nav" .}}   
    <!--  showGroup true -->
    <template v-if="showGroup">
        <section class="container table-responsive content" style="max-width: 95vw" v-for="group in nodesTag">
            {{template "theme-custom/server-status-home-group-true" .}} 
        </section>
    </template>
    <!--  showGroup false -->
    <template v-else>
        <section class="container table-responsive content" style="max-width: 95vw">
            {{template "theme-custom/server-status-home-group-false" .}}
        </section>
    </template>
    {{template "theme-custom/server-status-content-footer" .}}
</div>
<script>
    new Vue({
        el: '#app',
        delimiters: ['@#', '#@'],
        data: {
            nodesTag: [],
            nodesNoTag: [],
            chartDataList: [], 
            page: 'index'
        },
        mixins: [mixinsVue],
        created() {
            const initData = JSON.parse('{{.Servers}}').servers;
            if(this.showGroup) {
                this.nodesTag = this.groupingData(this.handleNodes(initData),"Tag");
            } else {
                this.nodesNoTag = this.handleNodes(initData);
            }
        },
        mounted() {
            this.connect();
        },
        methods: {
            isWindowsPlatform(str) {
                return str.includes('Windows')
            },
            getFontLogoClass(str) {
                if (["almalinux",
                        "alpine",
                        "aosc",
                        "apple",
                        "archlinux",
                        "archlabs",
                        "artix",
                        "budgie",
                        "centos",
                        "coreos",
                        "debian",
                        "deepin",
                        "devuan",
                        "docker",
                        "elementary",
                        "fedora",
                        "ferris",
                        "flathub",
                        "freebsd",
                        "gentoo",
                        "gnu-guix",
                        "illumos",
                        "kali-linux",
                        "linuxmint",
                        "mageia",
                        "mandriva",
                        "manjaro",
                        "nixos",
                        "openbsd",
                        "opensuse",
                        "pop-os",
                        "raspberry-pi",
                        "redhat",
                        "rocky-linux",
                        "sabayon",
                        "slackware",
                        "snappy",
                        "solus",
                        "tux",
                        "ubuntu",
                        "void",
                        "zorin"].indexOf(str)
                    > -1) {
                    return str;
                }
                if (['openwrt', 'linux', "immortalwrt"].indexOf(str) > -1) {
                    return 'tux';
                }
                if (str == 'amazon') {
                    return 'redhat';
                }
                if (str == 'arch') {
                    return 'archlinux';
                }
                return '';
            },
            secondToDate(s) {
                const d = Math.floor(s / 3600 / 24);
                if (d > 0) {
                    return d + ' {{tr "Day"}}'
                }
                const h = Math.floor(s / 3600 % 24);
                const m = Math.floor(s / 60 % 60);
                const second = Math.floor(s % 60);
                return h + ":" + ("0" + m).slice(-2) + ":" + ("0" + second).slice(-2);
            },
            formatTimestamp(t) {
                return new Date(t * 1000).toLocaleString()
            },
            formatByteSize(bs) {
                const x = this.readableBytes(bs)
                return x !== "NaN undefined" ? x : '0B'
            },
            formatPercent(live, used, total) {
                //const percent = live ? (this.toFixed2(used / total * 100) || 0) : 0
                const percent = (this.toFixed2(used / total * 100) || 0)
                return this.formatPercents(live,percent)
            },
            formatPercents(live,percent) {
                //if(!live) { percent = 0; }
                if (percent <= 0) {
                    percent = 0;
                }
                if (percent >= 100) {
                    percent = 100;
                }
                if (!this.cache[percent]) {
                    this.cache[percent] = {
                        class: 'progress-bar progress-bar-success',
                        style: `width: ${parseInt(percent)+1}%`,
                        percent,
                    }
                    if (percent < 80) {
                        this.cache[percent].class = 'progress-bar progress-bar-success'
                    } else if (percent < 90) {
                        this.cache[percent].class = 'progress-bar progress-bar-warning'
                    } else {
                        this.cache[percent].class = 'progress-bar progress-bar-danger'
                    }
                }
                return this.cache[percent]
            },
            readableBytes(bytes) {
                if (!bytes) {
                    return '0B'
                }
                const i = Math.floor(Math.log(bytes) / Math.log(1024)),
                    sizes = ["B", "K", "M", "G", "T", "P", "E", "Z", "Y"];
                return parseFloat((bytes / Math.pow(1024, i)).toFixed(2)) + sizes[i];
            },
            connect() {
                const wsProtocol = window.location.protocol === "https:" ? "wss" : "ws"
                const ws = new WebSocket(wsProtocol + '://' + window.location.host + '/ws');
                ws.onopen = function () {
                    console.log("Connection open ...")
                }
                ws.onmessage = (evt) => {
                    let jsonData = evt.data
                    const data = JSON.parse(jsonData)
                    for (let i = 0; i < data.servers?.length; i++) {
                        const ns = data.servers[i];
                        if (!ns.Host) {
                            data.servers[i].live = false
                        } else {
                            const lastActive = new Date(ns.LastActive).getTime()
                            data.servers[i].live = data.now - lastActive <= 10 * 1000;
                        }
                    }
                    if(this.showGroup) {
                        this.nodesTag = this.groupingData(this.handleNodes(data.servers),"Tag");
                    } else {
                        this.nodesNoTag = this.handleNodes(data.servers);
                    }
                }
                ws.onclose = () => {
                    setTimeout(function () {
                        this.connect()
                    }, 5000);
                }
                ws.onerror = function () {
                    ws.close()
                }
            },
            handleNodes(servers) {
                let nodes = []
                servers?.forEach(server => {
                    let platform = server.Host.Platform;
                    if (this.isWindowsPlatform(platform)) {
                        platform = "windows"
                    }else if (platform === "immortalwrt") {
                        platform = "openwrt"
                    }
                    let node = {
                        ID: server.ID,
                        name: server.Name,
                        os: platform,
                        location: server.Host.CountryCode,
                        uptime: this.secondToDate(server.State.Uptime),
                        load: this.toFixed2(server.State.Load1),
                        network: this.getNetworkSpeed(server.State.NetInSpeed, server.State.NetOutSpeed),
                        traffic: this.formatByteSize(server.State.NetInTransfer) + ' | ' + this.formatByteSize(server.State.NetOutTransfer),
                        cpu: this.formatPercents(server.live, this.toFixed2(server.State.CPU)),
                        memory: this.formatPercent(server.live, server.State.MemUsed, server.Host.MemTotal),
                        hdd: this.formatPercent(server.live, server.State.DiskUsed, server.Host.DiskTotal),
                        online: server.live,
                        state: server.State,
                        host: server.Host,
                        lastActive: server.LastActive,
                        Tag: server.Tag,
                    }
                    nodes.push(node)
                })
                return nodes;
            },
            getNetworkSpeed(netInSpeed, netOutSpeed) {
                return this.formatByteSize(netInSpeed) + ' | ' + this.formatByteSize(netOutSpeed)
            },
            showCharts(event, id) {
                const isAriaExpandedFalse = event.currentTarget.getAttribute('aria-expanded') === 'false';
                if (!isAriaExpandedFalse) {
                    return;
                }
                this.fetchChartsData(id);
            },
            fetchChartsData(id) {
                const url = `/api/v1/monitor/${id}`;
                fetch(url)
                    .then(response => response.json())
                    .then(data => {
                        if (data.result) {
                            this.chartDataList[id - 1] = data.result;
                            this.waitForDOMRender(id);
                        } else {
                            console.error('Error: Data result is missing.');
                            return;
                        }
                    })
                    .catch(error => console.error('Error fetching data:', error));
            },
            waitForDOMRender(id) {
                requestAnimationFrame(() => {
                    if (this.$refs[`chart${id}`] && this.$refs[`chart${id}`][0]) {
                        this.renderCharts(id);
                    } else {
                        setTimeout(() => {
                            this.waitForDOMRender(id);
                        }, 100);
                    }
                });
            },
            renderCharts(id) {
                const MaxTCPPingValue = {{.MaxTCPPingValue}} ? {{.MaxTCPPingValue}} : 300;
                const fontSize = this.checkIsMoible() ? 10 : 14;
                const gridLeft = this.checkIsMoible() ? 25 : 36;
                const gridRight = this.checkIsMoible() ? 25 : 36;
                const systemDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                const theme = localStorage.getItem("theme") ? localStorage.getItem("theme") : systemDarkMode;
                const chartTheme = theme == "dark" ? "dark" : "default";
                const fontColor = theme == "dark" ? "#f1f1f1" : "#000000";
                const backgroundColor = theme == "dark" ? "#1C1D26" : "#ffffff";
                const borderColor = theme == "dark" ? "#31363B" : "#ffffff";
                const chartData = this.chartDataList[id - 1];

                if (chartData && chartData.length > 0) {
                    const chartContainer = this.$refs[`chart${id}`][0];
                    const chart = echarts.init(chartContainer, chartTheme, {
                        renderer: 'canvas',
                        useDirtyRect: false
                    }); 
                    const xAxisData = chartData[0].created_at.map(time => new Date(time).toLocaleString());
                    const seriesData = chartData.map(item => {
                        let loss = 0;
                        const data = item.avg_delay.map((avgDelay, index) => {
                            if (avgDelay > MaxTCPPingValue) {
                                loss += 1;
                            }
                            return [new Date(item.created_at[index]).toLocaleString(), avgDelay];
                        });
                        const lossRate = ((loss / item.created_at.length) * 100).toFixed(1);
                        item.monitor_name = item.monitor_name + " " + lossRate + "%";
                        return {
                            name: item.monitor_name,
                            type: 'line',
                            smooth: true,
                            symbol: 'none',
                            data: data
                        };
                    });
                    const option = {
                        backgroundColor: backgroundColor,
                        title: {
                            text: '三网:',
                            show: false,
                            left: 0,
                            top: 2,
                            textStyle: {
                                color: fontColor,
                                fontSize: fontSize,
                                fontFamily: 'Lato,"Helvetica Neue",Arial,Helvetica,sans-serif',
                                fontWeight: 'normal'
                            }
                        },
                        tooltip: {
                            trigger: 'axis',
                            backgroundColor: backgroundColor,
                            borderColor: borderColor,
                            textStyle: {
                                fontSize: fontSize,
                                color: fontColor
                            }
                        },
                        legend: {
                            data: chartData.map(item => item.monitor_name),
                            show: true,
                            textStyle: {
                                fontSize: fontSize,
                                color: fontColor
                            },
                            top: 0,
                            bottom: 0,
                        },
                        xAxis: {
                            type: 'time',
                            data: xAxisData,
                            axisLabel: {
                                textStyle: {
                                    fontSize: fontSize
                                }
                            }
                        },
                        yAxis: {
                            type: 'value',
                            axisLabel: {
                                textStyle: {
                                    fontSize: fontSize
                                }
                            }
                        },
                        dataZoom: [
                            {
                                type: 'slider',
                                start: 0,
                                end: 100
                            }
                        ],
                        series: seriesData,
                        textStyle: {
                            fontSize: fontSize,
                            color: fontColor
                        },
                        grid: {
                            top: '40',
                            left: gridLeft,
                            right: gridRight
                        }
                    };
                    chart.setOption(option);
                }
            },
            // 检测设备类型
            checkIsMoible() {
                // 获取窗口宽度
                var windowWidth = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;
                var threshold = 768; // 宽度小于等于768px是移动端，大于768px是PC端
                return windowWidth <= threshold ? true : false;
            }
        }
    })
</script>
{{template "theme-custom/server-status-footer" .}}
{{end}}
